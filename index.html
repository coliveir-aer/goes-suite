<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GOES Data Viewer</title>
    <link rel="icon" type="image/x-icon" href="/goes-suite/favicon.ico">

    <!-- Boot splash spinner. Inline so it paints the instant <body> starts
         rendering, without waiting on the bundled CSS. ReactDOM
         .createRoot().render() replaces #root-container's children when
         React mounts, so the spinner disappears on its own once the module
         bundle finishes loading and mountApp() runs. -->
    <style>
        #boot-splash {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0e1620;
            color: #cbd5e1;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            letter-spacing: 0.04em;
            z-index: 99999;
        }
        #boot-splash-ring {
            width: 56px;
            height: 56px;
            border: 4px solid rgba(148, 163, 184, 0.2);
            border-top-color: #38bdf8;
            border-radius: 50%;
            animation: boot-spin 0.9s linear infinite;
            margin-bottom: 14px;
        }
        @keyframes boot-spin {
            to { transform: rotate(360deg); }
        }
        #boot-splash-msg { color: #94a3b8; }
    </style>
  <script type="module" crossorigin src="/goes-suite/assets/index-BlqTRsGs.js"></script>
  <link rel="stylesheet" crossorigin href="/goes-suite/assets/index-CcySCkMn.css">
</head>
<body>
    <button id="mobile-menu-btn">&#9776; Menu</button>

    <!-- Single React root. Sidebar (#sidebar) and main view both render here so
         they share NotificationProvider state without prop-drilling. The
         boot-splash child is shown while the module bundle loads; React
         replaces it when mountApp() runs. -->
    <div id="root-container" style="display: contents;">
        <div id="boot-splash">
            <div id="boot-splash-ring"></div>
            <div id="boot-splash-msg">GOES-R Viewer Suite &mdash; loading</div>
        </div>
    </div>

</body>
</html>
